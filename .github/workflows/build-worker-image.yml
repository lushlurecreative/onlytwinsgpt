name: Build and Push Worker Image

on:
  push:
    paths:
      - 'worker/**'
      - '.github/workflows/build-worker-image.yml'
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          file: ./worker/Dockerfile.production
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/onlytwinsgpt-worker:latest
            ${{ secrets.DOCKER_USERNAME }}/onlytwinsgpt-worker:${{ github.sha }}

      - name: Image built successfully
        run: echo "✅ Worker image pushed to Docker Hub as ${{ secrets.DOCKER_USERNAME }}/onlytwinsgpt-worker:latest"
